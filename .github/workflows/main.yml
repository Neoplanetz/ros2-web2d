name: CI

on: [push, pull_request]

jobs:
  ci:
    name: ${{ matrix.node_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node_version: [20, 22]
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v7
      with:
        cache: npm
        node-version: ${{ matrix.node_version }}
    - name: Install grunt-cli
      run: npm install -g grunt-cli
    - name: Install
      run: npm install
    - name: Lint
      run: npm run lint
    - name: Check transpile drift
      run: npm run check:transpile
    - name: Build
      run: npm run build
    - name: Test
      run: npm test
    - name: Build example studio
      run: |
        cd examples
        npm install
        npm run build
